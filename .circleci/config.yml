version: 2.1

orbs:
  sonarcloud: sonarsource/sonarcloud@2.0

jobs:

  build_and_scan:
    docker:
      - image: cimg/node:20.5

    environment:
      DOCKER_BUILDKIT: 1

    steps:
      - checkout

      - run:
          name: Install Node Dependencies
          command: npm install

      # -------------------------------
      # SONARCLOUD SCAN (FULLY FIXED)
      # -------------------------------
      - sonarcloud/scan

      - setup_remote_docker:
          docker_layer_caching: true

      - run:
          name: Generate Dynamic Docker Image Tag
          command: |
            export TAG="build-${CIRCLE_BUILD_NUM}"
            echo $TAG > image_tag.txt
            echo "Generated TAG: $TAG"

      - persist_to_workspace:
          root: .
          paths:
            - image_tag.txt


  docker_build_push:
    docker:
      - image: cimg/base:stable

    steps:
      - checkout
      
      - setup_remote_docker:
          docker_layer_caching: true
      
      - attach_workspace:
          at: .

      - run:
          name: Load Dynamic Tag
          command: |
            export TAG=$(cat image_tag.txt)
            echo "Using TAG: $TAG"

      # -------------------------------
      # BUILD DOCKER IMAGE
      # -------------------------------
      - run:
          name: Build Docker Image
          command: |
            export TAG=$(cat image_tag.txt)
            docker build -t kaverigsautomech:$TAG .

      # -------------------------------
      # TRIVY SCAN
      # -------------------------------
      - run:
          name: Install Trivy
          command: |
            sudo apt-get update && sudo apt-get install -y wget
            wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.48.0_Linux-64bit.deb
            sudo dpkg -i trivy_0.48.0_Linux-64bit.deb

      - run:
          name: Run Trivy Scan
          command: |
            export TAG=$(cat image_tag.txt)
            trivy image --exit-code 0 kaverigsautomech:$TAG

      # -------------------------------
      # HEALTH CHECK
      # -------------------------------
      - run:
          name: Run Container (Health Check)
          command: |
            export TAG=$(cat image_tag.txt)
            docker run -d --rm -p 5000:5000 kaverigsautomech:$TAG
            echo "Container started successfully"

      # -------------------------------
      # PUSH TO DOCKER HUB
      # -------------------------------
      - run:
          name: Login & Push Image
          command: |
            export TAG=$(cat image_tag.txt)
            docker login -u "$DOCKER_USER" -p "$DOCKER_PASS"
            docker tag kaverigsautomech:$TAG $DOCKER_REPO/kaverigsautomech:$TAG
            docker push $DOCKER_REPO/kaverigsautomech:$TAG


workflows:
  build_pipeline:
    jobs:
      - build_and_scan:
          context: sonarcloud           # SONAR_TOKEN comes from CircleCI Context
      - docker_build_push:
          requires:
            - build_and_scan
