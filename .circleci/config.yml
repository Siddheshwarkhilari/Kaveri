version: 2.1

jobs:
  build:
    docker:
      - image: cimg/base:stable

    steps:
      - checkout

      - setup_remote_docker:
          docker_layer_caching: true

      - run:
          name: Build Docker Image
          command: |
            docker build -t kaverigsautomech .

      - run:
          name: Test Run (Optional)
          command: |
            docker run --rm -d -p 5000:5000 kaverigsautomech
            echo "Container started successfully"

workflows:
  version: 2
  build_pipeline:
    jobs:
      - build
