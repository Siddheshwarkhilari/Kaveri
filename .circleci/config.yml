version: 2.1

jobs:
  build_and_push:
    docker:
      - image: cimg/base:stable

    steps:
      - checkout

      - setup_remote_docker:
          docker_layer_caching: true

      - run:
          name: Docker Login
          command: |
            echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

      - run:
          name: Build Image
          command: |
            docker build -t $DOCKERHUB_USERNAME/kaverigsautomech:latest .

      - run:
          name: Push Image
          command: |
            docker push $DOCKERHUB_USERNAME/kaverigsautomech:latest

workflows:
  version: 2
  build_pipeline:
    jobs:
      - build_and_push
