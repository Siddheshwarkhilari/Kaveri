version: 2.1

orbs:
  sonarcloud: sonarsource/sonarcloud@2.0

jobs:

  build_and_scan:
    docker:
      - image: cimg/node:20.5

    environment:
      DOCKER_BUILDKIT: 1

    steps:
      - checkout

      - run:
          name: Install Node Dependencies
          command: npm install

      - run:
          name: Install Sonar Scanner
          command: |
            wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
            unzip sonar-scanner-cli-5.0.1.3006-linux.zip
            mv sonar-scanner-5.0.1.3006-linux sonar-scanner
            echo 'export PATH="$PWD/sonar-scanner/bin:$PATH"' >> $BASH_ENV
            source $BASH_ENV


      # --------------------------------------------------------
      # MANUAL SONAR SCANNER (FIXES missing projectKey/org error)
      # --------------------------------------------------------
      - run:
          name: Manual SonarCloud Analysis (Guaranteed Fix)
          command: |
            sonar-scanner \
              -Dsonar.projectKey=Siddheshwarkhilari_GSAutoMech \
              -Dsonar.organization=siddheshwarkhilari \
              -Dsonar.sources=. \
              -Dsonar.host.url=https://sonarcloud.io \
              -Dsonar.login=$SONAR_TOKEN

      # --------------------------------------------------------
      # Backup: SONARCLOUD ORB SCAN (Optional)
      # --------------------------------------------------------

      - setup_remote_docker:
          docker_layer_caching: true

      - run:
          name: Generate Dynamic Docker Image Tag
          command: |
            export TAG="build-${CIRCLE_BUILD_NUM}"
            echo $TAG > image_tag.txt
            echo "Generated TAG: $TAG"

      - persist_to_workspace:
          root: .
          paths:
            - image_tag.txt


  docker_build_push:
    docker:
      - image: cimg/base:stable

    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - attach_workspace:
          at: .

      - run:
          name: Load Dynamic Tag
          command: |
            export TAG=$(cat image_tag.txt)
            echo "Using TAG: $TAG"

      # ---- Build Docker Image ----
      - run:
          name: Build Docker Image
          command: |
            export TAG=$(cat image_tag.txt)
            docker build -t kaverigsautomech:$TAG .

      # ---- Trivy Install ----
      - run:
          name: Install Trivy
          command: |
            sudo apt-get update && sudo apt-get install -y wget
            wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.48.0_Linux-64bit.deb
            sudo dpkg -i trivy_0.48.0_Linux-64bit.deb

      # ---- Trivy Scan ----
      - run:
          name: Run Trivy Scan
          command: |
            export TAG=$(cat image_tag.txt)
            trivy image --exit-code 0 kaverigsautomech:$TAG

      # ---- Run Container (Health Check) ----
      - run:
          name: Run Container (Health Check)
          command: |
            export TAG=$(cat image_tag.txt)
            docker run -d --rm -p 5000:5000 kaverigsautomech:$TAG
            echo "Container started successfully"

      # ---- Push To Docker Hub ----
      - run:
          name: Login & Push Image
          command: |
            export TAG=$(cat image_tag.txt)
            docker login -u "$DOCKER_USER" -p "$DOCKER_PASS"
            docker tag kaverigsautomech:$TAG $DOCKER_REPO/kaverigsautomech:$TAG
            docker push $DOCKER_REPO/kaverigsautomech:$TAG


workflows:
  build_pipeline:
    jobs:
      - build_and_scan:
          context: sonarcloud     # Contains SONAR_TOKEN
      - docker_build_push:
          requires:
            - build_and_scan
